version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: littlegrid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - littlegrid-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: littlegrid-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PWD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - littlegrid-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: littlegrid-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_DRUID_URL: jdbc:p6spy:mysql://mysql:3306/${DB_NAME}?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PWD: ${REDIS_PWD}
      SERVER_PORT: ${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - mysql
      - redis
    networks:
      - littlegrid-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: littlegrid-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8001}:8001"
    depends_on:
      - backend
    networks:
      - littlegrid-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  littlegrid-network:
    driver: bridge
