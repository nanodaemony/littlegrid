spring:
  datasource:
    druid:
      db-type: com.alibaba.druid.pool.DruidDataSource
      driverClassName: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eladmin}?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false
      username: ${DB_USER:root}
      password: ${DB_PWD:123456}
      initial-size: 20
      min-idle: 20
      max-active: 50
      max-wait: 3000
      keep-alive: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      use-ping-method: false
      validation-query: SELECT 1
      webStatFilter:
        enabled: true
      stat-view-servlet:
        allow:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: admin
        login-password: 123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

login:
  single-login: false
  user-cache:
    idle-time: 21600
  code:
    code-type: arithmetic
    expiration: 2
    width: 111
    height: 36
    length: 2
    font-name:
    font-size: 25

jwt:
  header: Authorization
  token-start-with: Bearer
  base64-secret: ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODViOTg1ZGE0NTBjMGM4NDA5NzYxMjdjOWMwYWRmZTBlZjlhNGY3ZTg4Y2U3YTE1ODVkZDU5Y2Y3OGYwZWE1NzUzNWQ2YjFjZDc0NGMxZWU2MmQ3MjY1NzJmNTE0MzI=
  token-validity-in-seconds: 7200000
  online-key: "online_token:"
  code-key: "captcha_code:"
  detect: 1800000
  renew: 3600000

generator:
  enabled: false

swagger:
  enabled: false

file:
  mac:
    path: ~/file/
    avatar: ~/avatar/
  linux:
    path: /home/eladmin/file/
    avatar: /home/eladmin/avatar/
  windows:
    path: C:\eladmin\file\
    avatar: C:\eladmin\avatar\
  maxSize: 100
  avatarMaxSize: 5

amz:
  s3:
    region: test
    endPoint: https://s3.test.com
    domain: https://s3.test.com
    accessKey: 填写你的AccessKey
    secretKey: 填写你的SecretKey
    defaultBucket: 填写你的存储桶名称
    timeformat: yyyy-MM
