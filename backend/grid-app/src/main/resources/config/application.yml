server:
  port: ${SERVER_PORT:8000}
  http2:
    enabled: true
  compression:
    enabled: true
    mime-types: text/html, text/xml, text/plain, application/json

spring:
  freemarker:
    check-template-location: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  redis:
    database: ${REDIS_DB:0}
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PWD:}
    timeout: 5000
    lettuce:
      pool:
        max-active: 30
        max-wait: -1
        max-idle: 20
        min-idle: 1

task:
  pool:
    core-pool-size: 10
    max-pool-size: 30
    keep-alive-seconds: 60
    queue-capacity: 50

code:
  expiration: 300

rsa:
  private_key: 
